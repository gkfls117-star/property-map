<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>My Property Map</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f7f5f0;--surface:#fff;--surface2:#f0ede6;--border:#e0dbd0;
  --text:#1a1814;--text2:#6b6458;--text3:#a09890;
  --accent:#2d5a3d;--accent-light:#e8f0eb;--accent2:#c17f3a;
  --danger:#c04040;--danger-light:#fdf0f0;
  --radius:10px;--shadow:0 2px 16px rgba(0,0,0,.08);
  --sb-width:300px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'DM Sans','Apple SD Gothic Neo','Noto Sans KR','Noto Sans SC',sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;display:flex;flex-direction:column}

/* ── Header ── */
header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 14px;height:52px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;z-index:1000}
.logo{font-family:'DM Serif Display',serif;font-size:16px;color:var(--accent);letter-spacing:-.3px;white-space:nowrap}
.logo span{color:var(--accent2)}
.header-right{display:flex;align-items:center;gap:6px}
.count-badge{background:var(--accent-light);color:var(--accent);font-size:11px;padding:3px 8px;border-radius:20px;font-weight:500;white-space:nowrap}
.lang-toggle{display:flex;border:1px solid var(--border);border-radius:8px;overflow:hidden;flex-shrink:0}
.lang-btn{padding:5px 8px;font-size:11px;font-weight:500;cursor:pointer;background:transparent;border:none;color:var(--text3);font-family:inherit}
.lang-btn.active{background:var(--accent);color:#fff}
.btn-io{background:var(--surface2);border:1px solid var(--border);color:var(--text2);border-radius:8px;padding:5px 8px;font-size:14px;cursor:pointer}
.btn-add{background:var(--accent);color:#fff;border:none;border-radius:var(--radius);padding:7px 12px;font-size:12px;font-family:inherit;cursor:pointer;font-weight:500;white-space:nowrap}
.btn-add:hover{background:#1e3f2a}

/* ── Layout ── */
.main{display:flex;flex:1;overflow:hidden;position:relative}
#map{flex:1;z-index:1}

/* ── Sidebar (Desktop) ── */
.sidebar{width:var(--sb-width);background:var(--surface);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0;transition:width .25s cubic-bezier(.4,0,.2,1)}
.sidebar.collapsed{width:0;border-left:none;overflow:hidden}
.btn-collapse{position:absolute;right:var(--sb-width);top:50%;transform:translateY(-50%);z-index:900;background:var(--surface);border:1px solid var(--border);border-right:none;border-radius:8px 0 0 8px;width:18px;height:44px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--text3);box-shadow:-2px 0 6px rgba(0,0,0,.06);transition:right .25s}
.btn-collapse.collapsed{right:0;border-right:1px solid var(--border);border-left:none;border-radius:0 8px 8px 0}
.btn-collapse:hover{background:var(--surface2)}

/* ── Tabs ── */
.sb-tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0}
.sb-tab{flex:1;padding:10px 0;font-size:11px;font-weight:500;text-align:center;cursor:pointer;color:var(--text3);border-bottom:2px solid transparent;white-space:nowrap}
.sb-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.sb-panel{display:none;flex:1;flex-direction:column;overflow:hidden}
.sb-panel.active{display:flex}
.sb-list{flex:1;overflow-y:auto;padding:8px}
.sb-list::-webkit-scrollbar{width:3px}
.sb-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* ── Nearby ── */
.nearby-controls{padding:10px 10px 8px;border-bottom:1px solid var(--border);flex-shrink:0}
.nearby-controls select{width:100%;border:1px solid var(--border);border-radius:8px;padding:7px 10px;font-size:12px;font-family:inherit;color:var(--text);background:var(--bg);outline:none;margin-bottom:6px}
.nearby-row{display:flex;gap:6px;align-items:center}
.nearby-row select{flex:1;margin:0}
.rad-sel{width:76px!important;flex:none!important}
.btn-search{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:7px 12px;font-size:12px;font-family:inherit;cursor:pointer;white-space:nowrap}
.btn-search:disabled{background:var(--text3);cursor:default}
.nearby-hint{font-size:11px;color:var(--text3);padding:6px 2px 0;line-height:1.5}
.poi-card{border:1px solid var(--border);border-radius:8px;padding:9px 12px;margin-bottom:7px;cursor:pointer}
.poi-card:hover{border-color:var(--accent)}
.poi-name{font-size:13px;font-weight:500;color:var(--text);margin-bottom:3px}
.poi-meta{font-size:11px;color:var(--text3);display:flex;gap:8px;flex-wrap:wrap}
.poi-dist{color:var(--accent2);font-weight:500}

/* ── Property cards ── */
.prop-card{border:1px solid var(--border);border-radius:var(--radius);margin-bottom:8px;cursor:pointer;overflow:hidden;transition:border-color .15s,box-shadow .15s}
.prop-card:hover,.prop-card.active{border-color:var(--accent);box-shadow:0 0 0 2px rgba(45,90,61,.12)}
.prop-card-img{width:100%;height:100px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:32px;position:relative;overflow:hidden}
.prop-card-img img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0}
.prop-card-body{padding:10px 12px}
.prop-card-name{font-size:13px;font-weight:500;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.prop-card-price{font-size:13px;font-weight:500;color:var(--accent);margin-bottom:5px}
.prop-card-meta{display:flex;gap:8px;font-size:11px;color:var(--text3);flex-wrap:wrap}
.prop-card-memo{font-size:11px;color:var(--text3);margin-top:6px;padding-top:6px;border-top:1px solid var(--border);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.empty-state{text-align:center;padding:40px 16px;color:var(--text3);font-size:13px;line-height:1.8}
.empty-icon{font-size:32px;margin-bottom:10px;opacity:.5}

/* ── Detail panel ── */
.detail-panel{border-top:1px solid var(--border);background:var(--bg);padding:12px 14px;display:none;flex-shrink:0;max-height:50vh;overflow-y:auto}
.detail-panel.open{display:block}
.dp-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.dp-name{font-size:14px;font-weight:500;flex:1;line-height:1.4}
.dp-actions{display:flex;gap:6px;margin-left:8px;flex-shrink:0}
.btn-icon{background:var(--surface);border:1px solid var(--border);border-radius:6px;width:28px;height:28px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:12px}
.btn-icon:hover{background:var(--surface2)}
.btn-icon.danger:hover{background:var(--danger-light);border-color:var(--danger)}
.dp-rows{display:flex;flex-direction:column;gap:4px;margin-bottom:8px}
.dp-row{display:flex;justify-content:space-between;font-size:12px;gap:8px}
.dp-row .label{color:var(--text3);flex-shrink:0}
.dp-row .val{color:var(--text);font-weight:500;text-align:right}
.dp-price-sub{font-size:11px;color:var(--text3);text-align:right}
.media-strip{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:8px}
.media-strip::-webkit-scrollbar{height:3px}
.media-strip::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.media-thumb{width:64px;height:64px;border-radius:6px;object-fit:cover;flex-shrink:0;cursor:pointer;border:1.5px solid var(--border)}
.media-thumb:hover{border-color:var(--accent)}
.media-video-thumb{width:64px;height:64px;border-radius:6px;flex-shrink:0;background:#1a1814;display:flex;align-items:center;justify-content:center;cursor:pointer;border:1.5px solid var(--border);font-size:22px;color:#fff}
.btn-gmap{display:block;width:100%;margin-top:6px;background:#4285f4;color:#fff;border:none;border-radius:8px;padding:8px;font-size:12px;font-family:inherit;cursor:pointer;text-align:center;text-decoration:none;font-weight:500}
.btn-nearby-sc{margin-top:6px;width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:7px;font-size:12px;font-family:inherit;cursor:pointer;color:var(--text2)}
.btn-nearby-sc:hover{background:var(--accent-light);border-color:var(--accent);color:var(--accent)}

/* ── Type badges ── */
.type-badge{display:inline-block;font-size:10px;font-weight:500;padding:2px 7px;border-radius:20px;margin-right:4px}
.type-sale{background:#fff3e0;color:#b06010}
.type-lease{background:#e3f2fd;color:#1565c0}
.type-rent{background:#fce4ec;color:#ad1457}

/* ── Mobile bottom sheet ── */
@media(max-width:768px){
  :root{--sb-width:0px}
  .btn-collapse{display:none}
  body{flex-direction:column}
  #map{flex:1;min-height:0;height:auto}
  .main{flex-direction:column;height:calc(100vh - 52px)}
  .sidebar{
    width:100%!important;
    height:46vh;
    border-left:none;border-top:2px solid var(--border);
    flex-shrink:0;
    transition:height .3s cubic-bezier(.4,0,.2,1);
    overflow:hidden;
  }
  .sidebar.collapsed{height:44px}
  .sb-drag{display:none}
  /* 모바일 토글 탭바 */
  .mobile-toggle-bar{
    display:flex;align-items:center;justify-content:space-between;
    padding:0 14px;height:44px;
    background:var(--surface);border-bottom:1px solid var(--border);
    flex-shrink:0;cursor:pointer;
  }
  .mobile-toggle-label{font-size:13px;font-weight:500;color:var(--text)}
  .mobile-toggle-icon{font-size:16px;color:var(--text3);transition:transform .25s}
  .sidebar.collapsed .mobile-toggle-icon{transform:rotate(180deg)}
  .sb-tabs{display:none}
  .sidebar.collapsed .sb-tabs{display:none}
  .sidebar:not(.collapsed) .sb-tabs{display:flex}
  /* 카드 이미지 작게 */
  .prop-card-img{height:70px}
  .prop-card-body{padding:8px 10px}
  .prop-card-name{font-size:12px}
  .prop-card-price{font-size:12px}
  .fab{display:none}
}
@media(min-width:769px){
  .sb-drag{display:none}
  .fab{display:none}
  .mobile-toggle-bar{display:none}
}

/* ── Lightbox ── */
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:99999;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.lightbox.open{opacity:1;pointer-events:all}
.lightbox img,.lightbox video{max-width:92vw;max-height:86vh;border-radius:8px;object-fit:contain}
.lightbox-close{position:absolute;top:16px;right:18px;color:#fff;font-size:26px;cursor:pointer;line-height:1;opacity:.8}
.lightbox-close:hover{opacity:1}
.lb-nav{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.15);border:none;color:#fff;font-size:22px;cursor:pointer;padding:8px 13px;border-radius:8px}
.lb-nav:hover{background:rgba(255,255,255,.25)}
.lb-prev{left:10px}.lb-next{right:10px}
.lb-counter{position:absolute;bottom:14px;color:rgba(255,255,255,.6);font-size:12px}

/* ── Pin popup ── */
.pin-popup{position:absolute;z-index:2000;pointer-events:none;transform:translate(-50%,-100%);padding-bottom:8px;opacity:0;transition:opacity .15s}
.pin-popup.visible{opacity:1}
.pin-popup-inner{background:#fff;border-radius:10px;box-shadow:0 4px 20px rgba(0,0,0,.2);border:1px solid var(--border);overflow:hidden;width:170px}
.pin-popup-img{width:170px;height:100px;object-fit:cover;display:block}
.pin-popup-noimg{width:170px;height:64px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:26px;opacity:.4}
.pin-popup-body{padding:7px 10px 8px}
.pin-popup-name{font-size:12px;font-weight:500;color:var(--text);margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pin-popup-price{font-size:11px;color:var(--accent);font-weight:500}
.pin-popup-arrow{width:12px;height:7px;clip-path:polygon(0 0,100% 0,50% 100%);background:#fff;margin:0 auto;filter:drop-shadow(0 2px 1px rgba(0,0,0,.08))}

/* ── Map hint ── */
.map-hint{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.65);color:#fff;font-size:12px;padding:7px 16px;border-radius:20px;pointer-events:none;z-index:500;white-space:nowrap;transition:opacity .3s}

/* ── Modal ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:9999;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .18s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--surface);border-radius:14px;padding:20px;width:440px;max-width:95vw;box-shadow:var(--shadow);transform:translateY(10px);transition:transform .18s;max-height:90vh;overflow-y:auto}
.modal-overlay.open .modal{transform:translateY(0)}
.modal h2{font-family:'DM Serif Display',serif;font-size:19px;margin-bottom:16px}
.form-group{margin-bottom:11px}
.form-group label{font-size:11px;color:var(--text2);font-weight:500;display:block;margin-bottom:4px;text-transform:uppercase;letter-spacing:.05em}
.form-group input,.form-group textarea,.form-group select{width:100%;border:1px solid var(--border);border-radius:8px;padding:8px 10px;font-size:13px;font-family:inherit;color:var(--text);background:var(--bg);outline:none;transition:border-color .12s}
.form-group input:focus,.form-group textarea:focus{border-color:var(--accent)}
.form-group textarea{resize:vertical;min-height:54px}
.form-row{display:flex;gap:10px}
.form-row .form-group{flex:1}
.form-section{font-size:11px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin:14px 0 8px;padding-top:10px;border-top:1px solid var(--border)}
.lang-tag{font-size:10px;background:var(--surface2);color:var(--text2);padding:2px 5px;border-radius:4px;margin-left:3px}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
.btn-cancel{background:var(--surface2);border:1px solid var(--border);color:var(--text2);border-radius:8px;padding:8px 16px;font-size:13px;font-family:inherit;cursor:pointer}
.btn-save{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:8px 20px;font-size:13px;font-family:inherit;cursor:pointer;font-weight:500}
.hint{font-size:11px;color:var(--text3);margin-top:4px;line-height:1.5}
.media-url-list{display:flex;flex-direction:column;gap:6px;margin-bottom:6px}
.media-url-row{display:flex;gap:6px;align-items:center}
.media-url-row input{flex:1}
.btn-rm-media{background:var(--danger-light);border:1px solid #f5c0c0;color:var(--danger);border-radius:6px;width:28px;height:32px;cursor:pointer;font-size:14px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.btn-add-media{background:var(--surface2);border:1px solid var(--border);color:var(--text2);border-radius:8px;padding:6px 12px;font-size:12px;font-family:inherit;cursor:pointer;width:100%;margin-top:2px}
.btn-add-media:hover{background:var(--accent-light);border-color:var(--accent);color:var(--accent)}
.media-type-tag{font-size:10px;background:var(--surface2);color:var(--text2);padding:2px 6px;border-radius:4px;white-space:nowrap;flex-shrink:0}
.price-preview{font-size:11px;color:var(--accent2);margin-top:3px;font-weight:500}
.loading-spinner{text-align:center;padding:24px;color:var(--text3);font-size:12px}
.btn-export{background:var(--surface2);border:1px solid var(--border);color:var(--text2);border-radius:8px;padding:5px 8px;font-size:14px;cursor:pointer;display:flex;align-items:center}
.btn-export:hover{background:var(--accent-light);border-color:var(--accent)}
</style>
</head>
<body>

<header>
  <div class="logo">My Property <span>Map</span></div>
  <div class="header-right">
    <span class="count-badge" id="countBadge">0건</span>
    <div class="lang-toggle">
      <button class="lang-btn active" onclick="setLang('ko')" id="btnKo">🇰🇷 한국어</button>
      <button class="lang-btn" onclick="setLang('zh')" id="btnZh">🇨🇳 中文</button>
    </div>
    <button class="btn-io btn-export" onclick="exportData()" title="내보내기">📤</button>
    <label class="btn-io btn-export" title="가져오기" style="cursor:pointer">📥<input type="file" id="importFile" accept=".json" onchange="importData(event)" style="display:none"></label>
    <button class="btn-io btn-export" onclick="refreshFromSheets()" title="새로고침">🔄</button>
    <button class="btn-add" id="btnAdd" onclick="openAddModal()">+ 추가</button>
  </div>
</header>

<div class="main">
  <button class="btn-collapse" id="btnCollapse" onclick="toggleSidebar()">◀</button>
  <div id="map"></div>
  <div class="sidebar" id="sidebar">
    <div class="sb-drag" onclick="closeMobileSidebar()"><div class="sb-drag-bar"></div></div>
    <div class="mobile-toggle-bar" onclick="toggleMobileSidebar()" id="mobileToggleBar">
      <span class="mobile-toggle-label" id="mobileToggleLabel">🏠 매물목록</span>
      <span class="mobile-toggle-icon">▲</span>
    </div>
    <div class="sb-tabs">
      <div class="sb-tab active" id="tabListings" onclick="switchTab('listings')">🏠 <span id="tlListings">매물목록</span></div>
      <div class="sb-tab" id="tabNearby" onclick="switchTab('nearby')">🔍 <span id="tlNearby">주변검색</span></div>
    </div>

    <div class="sb-panel active" id="panelListings">
      <div class="sb-list" id="sbList"></div>
      <div class="detail-panel" id="detailPanel">
        <div class="dp-header">
          <div class="dp-name" id="dpName"></div>
          <div class="dp-actions">
            <div class="btn-icon" onclick="editActive()">✏️</div>
            <div class="btn-icon danger" onclick="deleteActive()">🗑️</div>
          </div>
        </div>
        <div id="dpMediaStrip"></div>
        <div class="dp-rows" id="dpRows"></div>
        <div id="dpGmapWrap"></div>
        <div style="display:flex;gap:6px;margin-top:6px"><button class="btn-nearby-sc" style="flex:1" onclick="searchNearbyFromActive()" id="btnNearbyShortcut">🔍 주변 상가 검색</button><button class="btn-nearby-sc" style="flex:1" onclick="openRoadview()" id="btnRoadview">🚶 로드뷰</button></div>
      </div>
    </div>

    <div class="sb-panel" id="panelNearby">
      <div class="nearby-controls">
        <select id="poiCategory"></select>
        <div class="nearby-row">
          <select id="poiCenter"><option value="">— 매물 선택 —</option></select>
          <select class="rad-sel" id="poiRadius">
            <option value="300">300m</option>
            <option value="500" selected>500m</option>
            <option value="1000">1km</option>
          </select>
          <button class="btn-search" id="btnSearch" onclick="searchNearby()"><span id="tlSearch">검색</span></button>
        </div>
        <div class="nearby-hint" id="nearbyHint"></div>
      </div>
      <div class="sb-list" id="poiList">
        <div class="empty-state"><div class="empty-icon">🔍</div><span id="tlPoiEmpty">검색 결과가 여기 표시됩니다.</span></div>
      </div>
    </div>
  </div>
</div>

<!-- FAB (mobile) -->
<button class="fab" id="fabBtn" onclick="openMobileSidebar()">🏠 <span id="fabLabel">매물 목록</span></button>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModalOutside(event)">
  <div class="modal">
    <h2 id="modalTitle">매물 추가</h2>
    <div class="form-section" id="secBasic">기본 정보</div>
    <div class="form-row">
      <div class="form-group">
        <label>한국어 이름 <span class="lang-tag">🇰🇷</span></label>
        <input type="text" id="fNameKo" placeholder="예: 강남 래미안 1동">
      </div>
      <div class="form-group">
        <label>中文名称 <span class="lang-tag">🇨🇳</span></label>
        <input type="text" id="fNameZh" placeholder="例: 江南来美安1栋">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label id="labelType">유형</label>
        <select id="fType"></select>
      </div>
      <div class="form-group">
        <label id="labelPrice">가격 (원화)</label>
        <input type="text" id="fPrice" placeholder="예: 250000000" oninput="previewPrice()">
        <div class="price-preview" id="pricePreview"></div>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label id="labelArea">면적</label>
        <input type="text" id="fArea" placeholder="예: 84㎡">
      </div>
      <div class="form-group">
        <label id="labelFloor">층수</label>
        <input type="text" id="fFloor" placeholder="예: 15층">
      </div>
    </div>
    <div class="form-section" id="secMedia">사진 / 동영상</div>
    <div class="media-url-list" id="mediaUrlList"></div>
    <button class="btn-add-media" id="btnAddMedia" onclick="addMediaRow()">+ URL 추가</button>

// ── Price ─────────────────────────────────────────────────────────────────
function parseKRW(str){
  if(!str) return null;
  const n=parseFloat(String(str).replace(/[^0-9.]/g,''));
  return isNaN(n)?null:n;
}
function formatKRW(n){
  if(n===null) return '';
  if(n>=100000000) return (n/100000000).toFixed(n%100000000===0?0:1)+'억원';
  if(n>=10000) return Math.round(n/10000)+'만원';
  return n.toLocaleString()+'원';
}
function formatCNY(n){
  if(n===null) return '';
  const cny=n*KRW_TO_CNY;
  if(cny>=10000) return '¥'+(cny/10000).toFixed(1)+'万';
  return '¥'+Math.round(cny).toLocaleString();
}
function previewPrice(){
  const n=parseKRW(document.getElementById('fPrice').value);
  const el=document.getElementById('pricePreview');
  el.textContent=n?`🇰🇷 ${formatKRW(n)}  →  🇨🇳 ${formatCNY(n)}`:'';
}

function convertMediaUrl(url){
  if(!url) return url;
  const m=url.match(/drive\.google\.com\/file\/d\/([^/]+)/);
  if(m) return `https://drive.google.com/uc?export=view&id=${m[1]}`;
  return url;
}
function isVideo(url){ return /\.(mp4|mov|webm|ogg|avi)(\?|$)/i.test(url); }
function addMediaRow(val=''){
  const list=document.getElementById('mediaUrlList');

  list.appendChild(row);
}

}

const STORAGE_KEY='myPropertyMap_v5';

// localStorage fallback for offline
function saveLocal(){ localStorage.setItem(STORAGE_KEY,JSON.stringify(properties)); }
function loadLocal(){ try{ return JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]'); }catch{ return []; } }

// Sheets sync
async function loadFromSheets(){
  return new Promise((resolve)=>{
    const cbName = 'cb_' + Date.now();
    window[cbName] = function(data){
      delete window[cbName];
      document.getElementById('jsonpScript')?.remove();
      if(data.status==='ok' && Array.isArray(data.properties)){
        properties = data.properties;
        saveLocal();
        resolve(true);
      } else {
        console.warn('Sheets bad response:', data);
        resolve(false);
      }
    };
    const s = document.createElement('script');
    s.id = 'jsonpScript';
    s.src = SCRIPT_URL + '?callback=' + cbName;
    s.onerror = ()=>{ delete window[cbName]; resolve(false); };
    document.head.appendChild(s);
    setTimeout(()=>{ if(window[cbName]){ delete window[cbName]; resolve(false); }}, 10000);
  });
}

async function syncToSheets(action, property, id){
  try{
    const body = {action};
    if(property) body.property = property;
    if(id) body.id = id;
    await fetch(SCRIPT_URL, {
      method:'POST',
      redirect:'follow',
      headers:{'Content-Type':'text/plain'},
      body: JSON.stringify(body)
    });
  }catch(e){ console.warn('Sheets sync failed:', e.message); }
}

function save(){ saveLocal(); }
function load(){ properties = loadLocal(); }

// ── Kakao Map ─────────────────────────────────────────────────────────────
let map, markers={}, pinPopupEl=null, ps, poiOverlays=[];
const TYPE_COLOR={sale:'#c17f3a',lease:'#1565c0',rent:'#ad1457'};


function makeMarkerImage(type, isActive){
  const c=TYPE_COLOR[type]||'#2d5a3d';
  const border=isActive?'#1a1814':'#fff';
  const svg=`<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20"><circle cx="10" cy="10" r="8" fill="${c}" stroke="${border}" stroke-width="2.5"/></svg>`;
  const src='data:image/svg+xml;charset=utf-8,'+encodeURIComponent(svg);
  return new kakao.maps.MarkerImage(src,new kakao.maps.Size(20,20),{offset:new kakao.maps.Point(10,10)});
}

function addMarker(p){
  if(!p.lat||!p.lng) return;
  if(markers[p.id]) markers[p.id].setMap(null);
  const pos=new kakao.maps.LatLng(p.lat,p.lng);
  const marker=new kakao.maps.Marker({position:pos,image:makeMarkerImage(p.type,false),map});
  kakao.maps.event.addListener(marker,'click',()=>selectProperty(p.id));
  kakao.maps.event.addListener(marker,'mouseover',()=>showPinPopup(p,marker));
  kakao.maps.event.addListener(marker,'mouseout',()=>hidePinPopup());
  markers[p.id]=marker;
}
function removeMarker(id){ if(markers[id]){markers[id].setMap(null);delete markers[id];} }
function refreshMarkers(){
  properties.forEach(p=>{
    if(!markers[p.id]&&p.lat) addMarker(p);
    if(markers[p.id]) markers[p.id].setImage(makeMarkerImage(p.type,p.id===activeId));
  });
}

// ── Pin Popup ─────────────────────────────────────────────────────────────
function getPinPopup(){
  if(!pinPopupEl){
    pinPopupEl=document.createElement('div');
    pinPopupEl.className='pin-popup';
    pinPopupEl.id='pinPopup';
    document.getElementById('map').appendChild(pinPopupEl);
  }
  return pinPopupEl;
}
function showPinPopup(p){
  const popup=getPinPopup();
  const name=getName(p);
  const priceN=parseKRW(p.price);
  const priceStr=lang==='zh'&&priceN?formatCNY(priceN):(priceN?formatKRW(priceN):(p.price||''));
  const thumb=p.media&&p.media.length&&!isVideo(p.media[0])?p.media[0]:null;
  popup.innerHTML=`<div class="pin-popup-inner">${thumb?`<img class="pin-popup-img" src="${esc(thumb)}" onerror="this.style.display='none'">`:`<div class="pin-popup-noimg">🏠</div>`}<div class="pin-popup-body"><div class="pin-popup-name">${esc(name)}</div>${priceStr?`<div class="pin-popup-price">${esc(priceStr)}</div>`:''}</div></div><div class="pin-popup-arrow"></div>`;
  popup.dataset.propId=p.id;
  updatePopupPos(p);
  popup.classList.add('visible');
}
function updatePopupPos(p){
  if(!map||!p.lat) return;
  const proj=map.getProjection();
  const pt=proj.containerPointFromCoords(new kakao.maps.LatLng(p.lat,p.lng));
  const popup=document.getElementById('pinPopup');
  if(popup){popup.style.left=pt.x+'px';popup.style.top=pt.y+'px';}
}
function hidePinPopup(){ const p=document.getElementById('pinPopup'); if(p) p.classList.remove('visible'); }

    p.area?[t('area'),esc(p.area)]:null,
    p.floor?[t('floor'),esc(p.floor)]:null,
    getMemo(p)?[lang==='zh'?'备注':'메모',esc(getMemo(p))]:null,
    p.lat?[lang==='zh'?'位置':'위치',`${p.lat.toFixed(5)}, ${p.lng.toFixed(5)}`]:null,
  ].filter(Boolean).map(([k,v])=>`<div class="dp-row"><span class="label">${k}</span><span class="val">${v}</span></div>`).join('');
  document.getElementById('dpGmapWrap').innerHTML=p.gmapUrl?`<a class="btn-gmap" href="${esc(p.gmapUrl)}" target="_blank">${t('openGmap')}</a>`:'';
  document.getElementById('btnNearbyShortcut').innerHTML='🔍 '+t('nearbyBtn');
}

// ── Select ────────────────────────────────────────────────────────────────
function selectProperty(id){
  activeId=id;
  const p=properties.find(x=>x.id===id);
  renderList(); renderDetail(p); refreshMarkers();
  if(p?.lat&&map) map.panTo(new kakao.maps.LatLng(p.lat,p.lng));
  document.getElementById(`card${id}`)?.scrollIntoView({behavior:'smooth',block:'nearest'});
  switchTab('listings');
  if(window.innerWidth<=768){
    openMobileSidebar();
    const label = document.getElementById('mobileToggleLabel');
    if(label) label.textContent = '🏠 ' + getName(p);
  }
}

// ── Kakao Places nearby search ────────────────────────────────────────────
function searchNearby(){
  const propId=parseInt(document.getElementById('poiCenter').value);
  const cat=document.getElementById('poiCategory').value;
  const radius=parseInt(document.getElementById('poiRadius').value);
  const p=properties.find(x=>x.id===propId);
  if(!p||!p.lat){document.getElementById('nearbyHint').textContent=t('nearbyDefault');return;}
  const btn=document.getElementById('btnSearch');
  btn.disabled=true;
  document.getElementById('poiList').innerHTML='<div class="loading-spinner">검색 중… / 搜索中…</div>';
  // clear old overlays
  poiOverlays.forEach(o=>o.setMap(null)); poiOverlays=[];

  ps.categorySearch(cat,function(data,status){
    btn.disabled=false;
    if(status!==kakao.maps.services.Status.OK){
      document.getElementById('poiList').innerHTML=`<div class="empty-state"><div class="empty-icon">⚠️</div>검색 실패 / 搜索失败</div>`;
      return;
    }
    const catObj=t('poiCats').find(c=>c.v===cat);
    const emoji=catObj?catObj.l.split(' ')[0]:'📌';
    const rLabel=radius>=1000?(radius/1000)+'km':radius+'m';
    document.getElementById('nearbyHint').textContent=lang==='zh'
      ?`在"${getName(p)}"${rLabel}范围内找到${data.length}个地点`
      :`"${getName(p)}" 주변 ${rLabel} 내 ${data.length}개 검색됨`;
    if(!data.length){
      document.getElementById('poiList').innerHTML=`<div class="empty-state"><div class="empty-icon">${emoji}</div>${t('poiEmpty')}</div>`;
      return;
    }
    document.getElementById('poiList').innerHTML=data.map(item=>`
      <div class="poi-card" onclick="window.open('${item.place_url}','_blank')">
        <div class="poi-name">${emoji} ${esc(item.place_name)}</div>
        <div class="poi-meta">
          <span class="poi-dist">${item.distance}m</span>
          ${item.road_address_name?`<span>${esc(item.road_address_name)}</span>`:''}
        </div>
      </div>`).join('');
    // markers on map
    const lats=[p.lat],lngs=[p.lng];
    data.forEach(item=>{
      const pos=new kakao.maps.LatLng(parseFloat(item.y),parseFloat(item.x));
      const svg=`<svg xmlns="http://www.w3.org/2000/svg" width="26" height="26"><circle cx="13" cy="13" r="11" fill="#fff" stroke="#e0dbd0" stroke-width="1.5"/><text x="13" y="18" text-anchor="middle" font-size="13">${emoji}</text></svg>`;
      const img=new kakao.maps.MarkerImage('data:image/svg+xml;charset=utf-8,'+encodeURIComponent(svg),new kakao.maps.Size(26,26),{offset:new kakao.maps.Point(13,13)});
      const m=new kakao.maps.Marker({position:pos,image:img,map});
      const iw=new kakao.maps.InfoWindow({content:`<div style="padding:4px 8px;font-size:12px;white-space:nowrap">${emoji} ${item.place_name}<br><small>${item.distance}m</small></div>`,removable:true});
      kakao.maps.event.addListener(m,'click',()=>iw.open(map,m));
      poiOverlays.push(m);
      lats.push(parseFloat(item.y)); lngs.push(parseFloat(item.x));
    });
    const bounds=new kakao.maps.LatLngBounds();
    lats.forEach((la,i)=>bounds.extend(new kakao.maps.LatLng(la,lngs[i])));
    map.setBounds(bounds);
  },{location:new kakao.maps.LatLng(p.lat,p.lng),radius});
}

function searchNearbyFromActive(){
  const p=properties.find(x=>x.id===activeId);
  if(!p?.lat) return;
  switchTab('nearby');
  document.getElementById('poiCenter').value=activeId;
  searchNearby();
}

// ── Lightbox ──────────────────────────────────────────────────────────────
let lbMedia=[],lbIdx=0;
function openLightbox(propId,idx){
  const p=properties.find(x=>x.id===propId);
  if(!p||!p.media) return;
  lbMedia=p.media; lbIdx=idx; renderLightbox();
  document.getElementById('lightbox').classList.add('open');
}
function renderLightbox(){
  const url=lbMedia[lbIdx];
  document.getElementById('lbContent').innerHTML=isVideo(url)
    ?`<video src="${esc(url)}" controls autoplay style="max-width:92vw;max-height:86vh;border-radius:8px"></video>`
    :`<img src="${esc(url)}" alt="media">`;
  document.getElementById('lbCounter').textContent=`${lbIdx+1} / ${lbMedia.length}`;
  document.querySelector('.lb-prev').style.display=lbMedia.length>1?'':'none';
  document.querySelector('.lb-next').style.display=lbMedia.length>1?'':'none';
}
function lbNav(dir){ lbIdx=(lbIdx+dir+lbMedia.length)%lbMedia.length; renderLightbox(); }
function closeLightbox(){ document.getElementById('lightbox').classList.remove('open'); document.getElementById('lbContent').innerHTML=''; }
document.getElementById('lightbox').addEventListener('click',e=>{ if(e.target===document.getElementById('lightbox')) closeLightbox(); });

// ── Modal ─────────────────────────────────────────────────────────────────
function openAddModal(){
  editingId=null;
  document.getElementById('modalTitle').textContent=t('modalAdd');
  ['fNameKo','fNameZh','fPrice','fArea','fFloor','fMemoKo','fMemoZh','fGmap','fLat','fLng'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('fType').value='sale';
  document.getElementById('mediaUrlList').innerHTML='';
  document.getElementById('pricePreview').textContent='';
  document.getElementById('modalOverlay').classList.add('open');
}
function openEditModal(p){
  editingId=p.id;
  document.getElementById('modalTitle').textContent=t('modalEdit');
  document.getElementById('fNameKo').value=p.nameKo||p.name||'';
  document.getElementById('fNameZh').value=p.nameZh||'';
  document.getElementById('fType').value=p.type||'sale';
  document.getElementById('fPrice').value=p.price||'';
  document.getElementById('fArea').value=p.area||'';
  document.getElementById('fFloor').value=p.floor||'';
  document.getElementById('fMemoKo').value=p.memoKo||p.memo||'';
  document.getElementById('fMemoZh').value=p.memoZh||'';
  document.getElementById('fGmap').value=p.gmapUrl||'';
  document.getElementById('fLat').value=p.lat||'';
  document.getElementById('fLng').value=p.lng||'';
  document.getElementById('mediaUrlList').innerHTML='';
  (p.media||[]).forEach(url=>addMediaRow(url));
  previewPrice();
  document.getElementById('modalOverlay').classList.add('open');
}
function closeModal(){ document.getElementById('modalOverlay').classList.remove('open'); }
function closeModalOutside(e){ if(e.target===document.getElementById('modalOverlay')) closeModal(); }

function saveProperty(){
  const nameKo=document.getElementById('fNameKo').value.trim();
  const nameZh=document.getElementById('fNameZh').value.trim();
  if(!nameKo&&!nameZh){alert(t('noName'));return;}
  const lat=parseFloat(document.getElementById('fLat').value)||null;
  const lng=parseFloat(document.getElementById('fLng').value)||null;
  const fields={
    nameKo,nameZh,name:nameKo||nameZh,
    type:document.getElementById('fType').value,
    price:document.getElementById('fPrice').value.trim(),
    area:document.getElementById('fArea').value.trim(),
    floor:document.getElementById('fFloor').value.trim(),
    memoKo:document.getElementById('fMemoKo').value.trim(),
    memoZh:document.getElementById('fMemoZh').value.trim(),
    memo:document.getElementById('fMemoKo').value.trim(),
    gmapUrl:document.getElementById('fGmap').value.trim(),
    media:getMediaUrls(),
  };
  if(editingId!==null){
    const p=properties.find(x=>x.id===editingId);
    if(p){ Object.assign(p,fields); if(lat&&lng){p.lat=lat;p.lng=lng;} removeMarker(p.id); addMarker(p); save(); closeModal(); renderList(); renderDetail(p); refreshMarkers(); }
  } else {
    const id=Date.now();
    const p={id,...fields,lat,lng};
    properties.push(p); save(); closeModal();
    if(p.lat&&p.lng){ addMarker(p); selectProperty(id); }
    else { pendingId=id; renderList(); renderDetail(p); showHint(t('pinHint')); }
  }
}
function editActive(){ const p=properties.find(x=>x.id===activeId); if(p) openEditModal(p); }
function deleteActive(){
  const p=properties.find(x=>x.id===activeId);
  if(!p||!confirm(t('confirmDelete'))) return;
  removeMarker(p.id); syncToSheets('delete', null, p.id); properties=properties.filter(x=>x.id!==activeId);
  activeId=null; save(); renderList(); renderDetail(null); refreshMarkers();
}

// ── Export / Import ───────────────────────────────────────────────────────
function exportData(){
  if(!properties.length){alert(lang==='zh'?'暂无数据可导出。':'내보낼 데이터가 없어요.');return;}
  const json=JSON.stringify({version:5,exported:new Date().toISOString(),properties},null,2);
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([json],{type:'application/json'}));
  a.download='property-map-data.json'; a.click();
}
function importData(event){
  const file=event.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      let data;
      try{ data=JSON.parse(e.target.result); }
      catch(pe){ alert('JSON 파싱 오류: '+pe.message); return; }
      let incoming=null;
      if(Array.isArray(data)) incoming=data;
      else if(data && Array.isArray(data.properties)) incoming=data.properties;
      else if(data && Array.isArray(data.listings)) incoming=data.listings;
      if(!incoming){ alert(lang==='zh'?'文件格式无效。':'파일 형식이 올바르지 않아요. properties 배열을 찾을 수 없어요.'); return; }
      const msg=incoming.length+'건 가져오기. 기존 데이터가 덮어씌워져요. 계속할까요?';
      if(!confirm(msg)) return;
      properties.forEach(p=>removeMarker(p.id));
      properties=incoming; save();
      properties.forEach(p=>addMarker(p));
      activeId=null; renderList(); renderDetail(null); refreshMarkers();
      if(properties.length){
        selectProperty(properties[0].id);
        if(map&&properties.filter(p=>p.lat).length){
          const bounds=new kakao.maps.LatLngBounds();
          properties.filter(p=>p.lat).forEach(p=>bounds.extend(new kakao.maps.LatLng(p.lat,p.lng)));
          map.setBounds(bounds);
        }
      }
      alert(lang==='zh'?`成功导入 ${properties.length} 个房源！`:`${properties.length}건 가져오기 완료!`);
    }catch{alert(lang==='zh'?'文件格式无效。':'파일 형식이 올바르지 않아요.');}
    event.target.value='';
  };
  reader.readAsText(file);
}


// ── Mobile sidebar toggle ──────────────────────────────────────────────────
function toggleMobileSidebar(){
  const sb = document.getElementById('sidebar');
  const label = document.getElementById('mobileToggleLabel');
  sb.classList.toggle('collapsed');
  // sync label
  const isCollapsed = sb.classList.contains('collapsed');
  if(label) label.textContent = isCollapsed ? '🏠 매물목록 (' + properties.length + ')' : '🏠 매물목록';
}
function openMobileSidebar(){
  const sb = document.getElementById('sidebar');
  sb.classList.remove('collapsed');
}

// ── Roadview ──────────────────────────────────────────────────────────────
let rvClient = null;
function openRoadview(){
  const p = properties.find(x=>x.id===activeId);
  if(!p||!p.lat){ alert('위치 정보가 없어요.'); return; }
  const overlay = document.getElementById('rvOverlay');
  overlay.style.display = 'flex';
  if(!rvClient){
    rvClient = new kakao.maps.Roadview(document.getElementById('rvContainer'));
  }
  const rvClient2 = new kakao.maps.RoadviewClient();
  const pos = new kakao.maps.LatLng(p.lat, p.lng);
  rvClient2.getNearestPanoId(pos, 50, function(panoId){
    if(panoId){
      rvClient.setPanoId(panoId, pos);
    } else {
      alert('이 위치의 로드뷰가 없어요.');
      overlay.style.display = 'none';
    }
  });
}
function closeRoadview(){
  document.getElementById('rvOverlay').style.display = 'none';
}


async function refreshFromSheets(){
  const btn = document.querySelector('[onclick="refreshFromSheets()"]');
  if(btn){ btn.textContent='⏳'; btn.disabled=true; }
  const ok = await loadFromSheets();
  if(ok){
    Object.keys(markers).forEach(id=>{ markers[id].setMap(null); delete markers[id]; });
    poiOverlays.forEach(o=>o.setMap(null)); poiOverlays=[];
    properties.forEach(p=>addMarker(p));
    activeId=null; renderList(); renderDetail(null); refreshMarkers();
    if(properties.length>0) selectProperty(properties[0].id);
  }
  if(!ok) alert('데이터 불러오기 실패. 콘솔(F12)을 확인해주세요.');
  if(btn){ btn.textContent='🔄'; btn.disabled=false; }
}

function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
